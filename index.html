<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA Mission Explorer</title>
    <meta name="description" content="Explore the universe with NASA's Astronomy Picture of the Day. Find out what the cosmos looked like on your birthday!">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="header blur-effect glow-border">
            <div class="header-content">
                <div class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="12" cy="12" r="3" fill="currentColor" opacity="0.8"/>
                        <path d="M19 12L16 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M5 12L8 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 19L12 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 5L12 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <h1>Mission Explorer</h1>
                </div>
                <div class="date-selector">
                    <label for="apod-date" class="date-label">Discover your space birthday:</label>
                    <input type="date" id="apod-date" aria-label="Select Date for APOD">
                </div>
            </div>
        </header>

        <main class="main-content">
            <section id="loading-state" class="state-container hidden">
                <div class="spinner"></div>
                <p>Initializing uplink to NASA database...</p>
            </section>

            <section id="error-state" class="state-container hidden">
                <div class="error-icon">⚠️</div>
                <h2 id="error-title">Connection Lost</h2>
                <p id="error-message">Unable to retrieve mission data. Please check connection.</p>
                <button id="retry-btn" class="glass-btn">Retry Connection</button>
            </section>

            <article id="content-state" class="content-card blur-effect glow-border hidden">
                <div class="media-container" id="media-container" title="Click image to expand">
                </div>
                <div class="info-container">
                    <header class="info-header">
                        <div class="info-header-top">
                            <span class="date-badge" id="apod-date-display">Date</span>
                            <button id="hd-toggle" class="hd-btn hidden">
                                <span class="hd-status">HD OFF</span>
                            </button>
                        </div>
                        <h2 id="apod-title" class="title">Mission Title</h2>
                    </header>
                    <div class="explanation">
                        <p id="apod-explanation">Explanation data will appear here...</p>
                    </div>
                </div>
            </article>
        </main>
    </div>

    <div id="image-modal" class="modal hidden">
        <span class="close-modal" id="close-modal">&times;</span>
        <div class="modal-content">
            <img id="modal-image" src="" alt="Full screen space image">
            <div id="modal-caption" class="modal-caption"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
